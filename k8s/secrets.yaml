# Define Secrets provider class here to pull secrets from Azure Key Vault using CSI driver.
# Use Managed Identity. Do NOT hardcode any credentials.
# Azure Key Vault CSI Driver - SecretProviderClass
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-secrets
  namespace: microservices
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "$(MANAGED_IDENTITY_CLIENT_ID)"
    keyvaultName: "$(KEY_VAULT_NAME)"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: db-host
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-user
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-name
          objectType: secret
          objectVersion: ""
        - |
          objectName: jwt-secret
          objectType: secret
          objectVersion: ""
    tenantId: "$(AZURE_TENANT_ID)"
  secretObjects:
  - secretName: app-secrets
    type: Opaque
    data:
    - objectName: db-host
      key: db-host
    - objectName: db-user
      key: db-user
    - objectName: db-password
      key: db-password
    - objectName: db-name
      key: db-name
    - objectName: jwt-secret
      key: jwt-secret
