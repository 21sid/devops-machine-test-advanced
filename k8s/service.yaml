# Define ClusterIP Services for all 4 microservices here.
# auth-service ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: microservices
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
  - port: 4001
    targetPort: 4001
    protocol: TCP
---
# order-service ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: microservices
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
  - port: 4002
    targetPort: 4002
    protocol: TCP
---
# payment-service ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: microservices
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
  - port: 4003
    targetPort: 4003
    protocol: TCP
---
# frontend ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: microservices
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
